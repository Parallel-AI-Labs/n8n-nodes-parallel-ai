name: Publish to npm

# Publishes the package to npm with provenance, as required for n8n verified
# community nodes (https://docs.n8n.io/integrations/creating-nodes/deploy/submit-community-nodes/).
#
# Triggered by publishing a GitHub Release. Create a release whose tag matches
# the version in package.json (e.g. v0.3.19) to publish that version.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # `npm publish` runs `npm run build` via the prepublishOnly hook, so we
      # don't build separately here (a second build can skip emit due to the
      # incremental tsbuildinfo cache).
      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
